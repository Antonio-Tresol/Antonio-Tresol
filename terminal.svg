  <!-- Terminal content -->
  <text x="20" y="70" fill="#2ecc71" font-size="14">$</text>
  <text x="35" y="70" fill="#ccd6f6" font-size="14">whoami</text>

  <text x="20" y="100" fill="#8892b0" font-size="14">Antonio Badilla-Olivas (Antonio-Tresol)</text>
  <text x="20" y="120" fill="#8892b0" font-size="14">Independent researcher, AI/ML Engineer, and</text>
  <text x="20" y="140" fill="#8892b0" font-size="14">M.Sc. student in CS at Universidad de Costa Rica.</text>

  <text x="20" y="175" fill="#2ecc71" font-size="14">$</text>
  <text x="35" y="175" fill="#ccd6f6" font-size="14">cat interests.txt</text>

  <text x="20" y="205" fill="#8892b0" font-size="14">I enjoy building intelligent systems and figuring</text>
  <text x="20" y="225" fill="#8892b0" font-size="14">out how to make sure they are safe and ethical.</text>
  <text x="20" y="245" fill="#8892b0" font-size="14">I'm interested in mechanistic interpretability,</text>
  <text x="20" y="265" fill="#8892b0" font-size="14">AI alignment, and AI safety.</text>
  <text x="20" y="295" fill="#8892b0" font-size="14">I enjoy learning about AI, software engineering,</text>
  <text x="20" y="315" fill="#8892b0" font-size="14">and math.</text>

  <text x="20" y="350" fill="#2ecc71" font-size="14">$</text>
  <text x="35" y="350" fill="#ccd6f6" font-size="14">cat stack.txt</text>

  <text x="20" y="380" fill="#8892b0" font-size="14">I mostly work in Python and PyTorch. I like C,</text>
  <text x="20" y="400" fill="#8892b0" font-size="14">tolerate C++, and think Rust is cool but it keeps</text>
  <text x="20" y="420" fill="#8892b0" font-size="14">humbling me. Cloud-wise I live in AWS and Azure.</text>
  <text x="20" y="440" fill="#8892b0" font-size="14">I also have a love-hate relationship with agentic</text>
  <text x="20" y="460" fill="#8892b0" font-size="14">AI SWE.</text>
